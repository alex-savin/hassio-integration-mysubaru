send_poi:
  name: Send POI
  description: Send a point of interest to the vehicle navigation system.
  fields:
    vin:
      name: VIN
      description: Vehicle identification number.
      required: true
      selector:
        text:
    name:
      name: Name
      description: Name of the destination.
      required: true
      selector:
        text:
    latitude:
      name: Latitude
      description: Latitude coordinate.
      required: true
      selector:
        number:
          min: -90
          max: 90
          step: "any"
          mode: box
    longitude:
      name: Longitude
      description: Longitude coordinate.
      required: true
      selector:
        number:
          min: -180
          max: 180
          step: "any"
          mode: box
    address:
      name: Address
      description: Street address (optional).
      selector:
        text:
    city:
      name: City
      description: City (optional).
      selector:
        text:
    state:
      name: State
      description: State (optional).
      selector:
        text:
    zip:
      name: ZIP
      description: ZIP code (optional).
      selector:
        text:
    category:
      name: Category
      description: POI category (optional).
      selector:
        text:


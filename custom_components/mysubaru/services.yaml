set_geofence:
  name: Set GeoFence
  description: Create a geofence boundary alert zone.
  fields:
    vin:
      name: VIN
      description: Vehicle identification number.
      required: true
      selector:
        text:
    latitude:
      name: Latitude
      description: Center latitude.
      required: true
      selector:
        number:
          min: -90
          max: 90
          step: "any"
          mode: box
    longitude:
      name: Longitude
      description: Center longitude.
      required: true
      selector:
        number:
          min: -180
          max: 180
          step: "any"
          mode: box
    radius:
      name: Radius
      description: Fence radius in meters.
      required: true
      selector:
        number:
          min: 100
          max: 50000
          step: 100
          mode: box
    name:
      name: Name
      description: Name of the geofence.
      required: true
      selector:
        text:
    enabled:
      name: Enabled
      description: Whether the geofence is active.
      default: true
      selector:
        boolean:
    entry_alert:
      name: Entry Alert
      description: Alert when vehicle enters the zone.
      default: true
      selector:
        boolean:
    exit_alert:
      name: Exit Alert
      description: Alert when vehicle exits the zone.
      default: true
      selector:
        boolean:

set_speedfence:
  name: Set Speed Fence
  description: Set a speed limit alert.
  fields:
    vin:
      name: VIN
      description: Vehicle identification number.
      required: true
      selector:
        text:
    speed_limit:
      name: Speed Limit
      description: Speed limit value.
      required: true
      selector:
        number:
          min: 1
          max: 200
          step: 1
          mode: box
    enabled:
      name: Enabled
      description: Whether the speed fence is active.
      default: true
      selector:
        boolean:
    persistent:
      name: Persistent
      description: Keep the speed fence active after trip ends.
      default: false
      selector:
        boolean:

set_curfew:
  name: Set Curfew
  description: Set a curfew alert schedule.
  fields:
    vin:
      name: VIN
      description: Vehicle identification number.
      required: true
      selector:
        text:
    start_time:
      name: Start Time
      description: Curfew start time (HH:MM format).
      required: true
      selector:
        text:
    end_time:
      name: End Time
      description: Curfew end time (HH:MM format).
      required: true
      selector:
        text:
    days_of_week:
      name: Days of Week
      description: Days of the week (0=Sun, 1=Mon, ... 6=Sat).
      required: true
      selector:
        object:
    enabled:
      name: Enabled
      description: Whether the curfew is active.
      default: true
      selector:
        boolean:

